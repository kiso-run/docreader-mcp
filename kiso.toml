[kiso]
type = "tool"
name = "docreader"
version = "0.1.0"
description = "Extract text from documents — PDF, DOCX, CSV, XLSX, and plain text files"

[kiso.tool]
summary = "Read and extract text from PDF, DOCX, CSV, XLSX, and plain text files"
usage_guide = """\
Use this tool to extract text content from document files in the session workspace. \
Supports PDF, DOCX, CSV, XLSX, and plain text formats. Files are typically found in \
the uploads/ directory (placed there by connectors or exec tasks).

Actions:
  read   — extract full text from a file (default)
  info   — get file metadata (pages, size, format) without full extraction
  list   — list files in uploads/ directory

For PDFs, use the 'pages' arg to read specific page ranges (e.g. "1-5", "3,7,10-12"). \
Large PDFs should be read in chunks to avoid excessive output.

The file_path arg is relative to the session workspace (e.g. "uploads/report.pdf")."""

[kiso.tool.args]
action    = { type = "string", required = false, description = "one of: read (default), info, list" }
file_path = { type = "string", required = false, description = "path to file, relative to workspace (e.g. 'uploads/report.pdf')" }
pages     = { type = "string", required = false, description = "page range for PDF (e.g. '1-5', '3,7,10-12')" }

[kiso.deps]
python = ">=3.11"
